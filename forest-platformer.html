<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Forest Quest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #game-wrapper {
    display: flex; flex-direction: column; align-items: stretch;
    width: min(98vw, calc(98vh * 1.8));
  }
  #ui {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 6px 14px;
    background: linear-gradient(135deg, #1a2a1a, #0d1f0d);
    border: 2px solid #2ecc71; border-bottom: none;
    border-radius: 8px 8px 0 0;
  }
  .ui-section { display: flex; align-items: center; gap: 14px; }
  .ui-player-label { font-size: 7px; padding: 2px 6px; border-radius: 3px; }
  .p1-label { background: #1a3a6a; color: #5dade2; }
  .p2-label { background: #4a1a1a; color: #e74c3c; }
  .ui-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .ui-label { font-size: 6px; color: #7fb87f; letter-spacing: 1px; }
  .ui-value { font-size: 11px; color: #2ecc71; }
  .lives-p1 { font-size: 10px; color: #5dade2; }
  .lives-p2 { font-size: 10px; color: #e74c3c; }
  .score-p1 { font-size: 11px; color: #f1c40f; }
  .score-p2 { font-size: 11px; color: #ff8c00; }
  canvas { display: block; width: 100%; border: 2px solid #2ecc71; border-radius: 0 0 8px 8px; image-rendering: pixelated; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; pointer-events: all;
  }
  #overlay.hidden { display: none; }
  .overlay-title {
    font-size: 22px; color: #2ecc71;
    text-shadow: 0 0 20px #2ecc71, 0 4px 0 #1a8a4a;
    animation: pulse 1.5s infinite;
  }
  .overlay-sub { font-size: 8px; color: #a8d8a8; text-align: center; line-height: 2.4; }
  .overlay-score { font-size: 11px; color: #f1c40f; text-shadow: 0 0 12px #f1c40f; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  #mode-select { display: flex; gap: 20px; pointer-events: all; }
  .mode-btn {
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    padding: 10px 16px; border: 2px solid #2ecc71; background: transparent;
    color: #2ecc71; cursor: pointer; border-radius: 4px; transition: all 0.2s;
  }
  .mode-btn:hover { background: #2ecc71; color: #000; }
  #controls { margin-top: 8px; font-size: 6px; color: #3a5a3a; text-align: center; line-height: 2.2; }
  #pause-menu {
    display: none; position: fixed; inset: 0;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: rgba(0,8,0,0.88);
    pointer-events: all; z-index: 10;
  }
  #pause-menu.visible { display: flex; }
  .pause-title { font-size: 18px; color: #2ecc71; text-shadow: 0 0 16px #2ecc71; letter-spacing: 2px; }
  .pause-btn {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 12px 24px; width: 220px;
    border: 2px solid #2ecc71; background: transparent;
    color: #2ecc71; cursor: pointer; border-radius: 4px;
    transition: all 0.15s; text-align: center;
  }
  .pause-btn:hover { background: #2ecc71; color: #000; }
  .pause-btn.danger { border-color: #e74c3c; color: #e74c3c; }

<div id="game-wrapper">

<canvas id="gameCanvas" width="900" height="500"></canvas>
</div><!-- /game-wrapper -->
<div id="overlay">

  <div class="overlay-title" id="overlay-title">🌿 FOREST QUEST</div>

  <div id="mode-select">

  </div>

  </div>

  <div class="overlay-score" id="overlay-score"></div>

  <button class="mode-btn" style="margin-top:12px;" onclick="window.location.href='../index.html'">
    🏠 חזור לעמוד הראשי
  </button>

</div>

</div>
<div id="pause-menu">

  <button class="pause-btn" onclick="resumeGame()">▶ המשך משחק</button>
  <button class="pause-btn danger" onclick="goToMainMenu()">🏠 תפריט ראשי</button>

<div id="controls">

function makePlayer(idx) {
  return {
    idx,
    x: idx === 1 ? 60 : 100,
    y: GROUND_Y - 42,
    w: 30, h: 42,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    big: false,
    starPower: false,
    powerTimer: 0,
    invincibleTimer: 0,
    lives: 3,
    score: 0,
    coins: 0,
    alive: true,
    dead: false,
    deadTimer: 0,
  };
}

let players = [makePlayer(1)];

function resetPlayer(p) {
  p.x = p.idx === 1 ? 60 : 100;
  p.y = GROUND_Y - 42;
  p.vx = 0; p.vy = 0;
  p.onGround = false; p.facing = 1;
  p.powerTimer = 0; p.invincibleTimer = 180; // 3 sec spawn protection

function makeLevel(lvl) {
  const GY = GROUND_Y;
  const design = LEVEL_DESIGNS[(lvl-1) % LEVEL_DESIGNS.length];
  const spd = 1 + (lvl-1)*0.2;

  // deep-clone platforms and scale moving speed
  const platforms = design.platforms.map(p => {
    const c = {...p};
    if(c.type==='moving') c.speed = c.speed * spd;
    return c;
  });

  const pits = design.pits;
  const spikes = design.spikes.map(s => ({...s, y: GY-14}));

  // walkers
  const walkers = design.walkers.map(e => ({
    kind:'walk', x:e.x, y:GY-36, dir:e.dir,
    speed:(1.1+(lvl-1)*0.3)*(0.85+Math.random()*0.3),
    alive:true, pl:e.pl
  }));

  // flyers — float at fixed y, patrol horizontally, cannot be stomped
  const flyers = design.flyers.map(f => ({
    kind:'fly', x:f.x, y:f.y, dir:f.dir,
    speed:(1.4+(lvl-1)*0.25)*(0.9+Math.random()*0.2),
    range:f.range, startX:f.x, alive:true
  }));

  // jumpers — on ground, periodically jump toward player
  const jumpers = design.jumpers.map(j => ({
    kind:'jump', x:j.x, y:GY-36, dir:1,
    speed:(0.8+(lvl-1)*0.2), vy:0,
    jumpTimer:Math.floor(Math.random()*80)+40,
    alive:true, pl:j.pl
  }));

  // dinos — fly in sine-wave, rideable, triggers bat swarm
  const dinos = (design.dinos||[]).map(d => ({
    kind:'dino', x:d.x, y:d.y, dir:d.dir,
    speed:(d.speed||1.2)*(1+(lvl-1)*0.15),
    range:d.range, startX:d.x, alive:true,
    rideTimer:0
  }));

  // turtles — walk on ground, stomp triggers shell shot
  const turtles = (design.turtles||[]).map(t => ({
    kind:'turtle', x:t.x, y:GY-32, dir:1,
    speed:(0.6+(lvl-1)*0.15)*(0.9+Math.random()*0.2),
    alive:true, pl:t.pl, shootTimer:0, stunned:0
  }));

  // vines — static hazard columns
  const vines = (design.vines||[]).map(v => ({
    kind:'vine', x:v.x, yTop:v.yTop, yBot:v.yBot,
    alive:true, phase: Math.random()*Math.PI*2
  }));

  const enemies = [...walkers, ...flyers, ...jumpers, ...dinos, ...turtles, ...vines];

  const coinItems = design.coins.map(([x,y]) => ({x,y,collected:false}));
  const bonusItems = design.bonus.map(b => ({...b,collected:false}));
  return { platforms, pits, spikes, enemies, coins:coinItems, bonusItems, LEVEL_LENGTH:design.LEVEL_LENGTH, TIMER:design.TIMER, projectiles:[] };
}

let levelData = makeLevel(1);
LEVEL_LENGTH = levelData.LEVEL_LENGTH;

// ─── PARTICLES ───────────────────────────────────────────
function spawnParticles(x,y,color,count=8) {
  for(let i=0;i<count;i++){
    const a=(Math.PI*2/count)*i;
    particles.push({x,y,vx:Math.cos(a)*3,vy:Math.sin(a)*3-2,life:30,maxLife:30,color,size:4+Math.random()*4});
  }
}

// ─── INPUT ───────────────────────────────────────────────
function isKey(...codes) { return codes.some(c=>keys[c]); }

document.addEventListener('keydown', e => {
  keys[e.key]=true; keys[e.code]=true;
  if(['w','W','i','I',' '].includes(e.key)) e.preventDefault();
  if(e.key==='Escape'){
    if(gameState==='playing') pauseGame();
    else if(gameState==='paused') resumeGame();
  }
  if(e.key==='Enter'||e.key===' '){
    if(gameState==='win') nextLevel();
    else if(gameState==='gameover') restartGame();
    else if(gameState==='paused') resumeGame();
    // Space in sky world is handled in updateSkyWorld via isKey
  }
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; keys[e.code]=false; });

function pauseGame(){
  gameState='paused';
  document.getElementById('pause-menu').classList.add('visible');
}
function resumeGame(){
  gameState='playing';
  document.getElementById('pause-menu').classList.remove('visible');
}
function goToMainMenu(){
  gameState='title';
  document.getElementById('pause-menu').classList.remove('visible');
  // Reset to fresh state
  players=[makePlayer(1)];
  levelData=makeLevel(1);
  level=1; cameraX=0; particles=[]; frameCount=0;
  // Show main overlay
  const ol=document.getElementById('overlay');
  ol.classList.remove('hidden');
  document.getElementById('overlay-title').textContent='🌿 FOREST QUEST';
  document.getElementById('overlay-score').textContent='';
  document.getElementById('overlay-sub').innerHTML='שחקן 1: A / D לתנועה &nbsp;|&nbsp; W לקפיצה<br>שחקן 2: J / L לתנועה &nbsp;|&nbsp; I לקפיצה';
  document.getElementById('mode-select').style.display='flex';
  updateUI();
}

// ─── PHYSICS ─────────────────────────────────────────────
function updatePlayer(p, goLeft, goRight, doJump, doRun) {
  if(!p.alive) return;

  if(p.dead){
    p.vy += GRAVITY;
    p.y += p.vy;
    p.deadTimer--;
    if(p.deadTimer<=0){
      p.lives--;
      updateUI();
      if(p.lives<=0){ p.alive=false; checkGameOver(); }
      else resetPlayer(p);
    }
    return;
  }

  if(p.powerTimer>0){ p.powerTimer--; if(p.powerTimer===0) p.starPower=false; }
  if(p.invincibleTimer>0) p.invincibleTimer--;

  if(goLeft)       { p.vx=-(doRun?5.5:MOVE_SPEED); p.facing=-1; }
  else if(goRight) { p.vx= (doRun?5.5:MOVE_SPEED); p.facing= 1; }
  else p.vx *= 0.82;

  if(doJump && p.onGround){ p.vy=JUMP_FORCE; p.onGround=false; }

  p.vy += GRAVITY;
  p.x += p.vx;
  p.y += p.vy;

  const ph = p.big ? 52 : 42;
  p.h = ph;
  p.onGround = false;

  levelData.platforms.forEach(plat=>{
    const overlapX = p.x+p.w > plat.x && p.x < plat.x+plat.w;
    if(!overlapX) return;
    // Land on top
    if(p.vy>=0 && p.y+ph > plat.y && p.y+ph < plat.y+plat.h+20){
      p.y = plat.y - ph;
      p.vy = 0;
      p.onGround = true;
      // Carry player with moving platform
      if(plat.type==='moving'){
        if(plat.axis==='v'){
          // vertical mover: push player up/down with it
          p.y += plat.speed * plat.dir;
        } else {
          // horizontal mover: push player sideways
          p.x += plat.speed * plat.dir;
        }
      }
    }
    // Head bump from below
    if(p.vy<0 && p.y < plat.y+plat.h && p.y+6 > plat.y){
      p.vy = 1;
    }
  });

  if(p.x < 0){ p.x=0; p.vx=0; }

  // Fell off
  if(p.y > H+80){ killPlayer(p); return; }

  // Spikes
  levelData.spikes.forEach(s=>{
    if(p.x+p.w>s.x && p.x<s.x+s.w && p.y+ph>s.y) hitPlayer(p);
  });

  // Enemies
  levelData.enemies.forEach(e=>{
    if(!e.alive) return;

    // VINE — short moving hazard
    if(e.kind==='vine'){
      const swing = Math.sin(e.phase)*14;
      const vx = e.x + swing - 6;
      if(p.x+p.w>vx && p.x<vx+16 && p.y+ph>e.yTop && p.y<e.yBot){
        hitPlayer(p);
      }
      return;
    }

    const ex=e.x, ey=e.y;
    const ew = e.kind==='dino'?44:28;
    const eh = e.kind==='dino'?36:(e.kind==='fly'?24:36);

    if(p.x+p.w-4>ex && p.x+4<ex+ew && p.y+ph>ey && p.y<ey+eh){
      if(p.starPower && e.kind!=='dino'){
        e.alive=false; p.score+=300;
        spawnParticles(ex+14,ey+15,'#f1c40f',12); updateUI();
      } else if(e.kind==='dino' && p.vy>0 && p.y+ph < ey+18){
        // Enter sky world!
        spawnParticles(ex+22,ey,'#a29bfe',20);
        enterSkyWorld(p, e);
        return;
      } else if(e.kind==='turtle' && p.vy>1 && p.y+ph < ey+14){
        // STOMP turtle — shoot shell
        p.vy=-9; p.score+=300; e.stunned=40; updateUI();
        spawnParticles(ex+14,ey+10,'#2ecc71',10);
        // Fire 3 shells: left, right, up
        const shells=[{vx:-4,vy:-3},{vx:4,vy:-3},{vx:0,vy:-8}];
        shells.forEach(sh=>{
          levelData.projectiles.push({
            kind:'shell', x:ex+14, y:ey+10,
            vx:sh.vx, vy:sh.vy, life:120,
            source:e
          });
        });
      } else if(p.vy>1 && p.y+ph < ey+14 && e.kind!=='dino'){
        // Normal stomp
        e.alive=false; p.vy=-9; p.score+=(e.kind==='fly'?350:200);
        spawnParticles(ex+14,ey+15,'#e74c3c'); updateUI();
      } else if(e.kind!=='dino'||p.vy<=0){
        hitPlayer(p);
      }
    }
  });

  // Projectile collision (shell falling back down hurts player)
  (levelData.projectiles||[]).forEach(pr=>{
    if(pr.vy<0) return; // only falling shells hurt
    if(p.x+p.w>pr.x-8 && p.x<pr.x+8 && p.y+ph>pr.y-8 && p.y<pr.y+8){
      hitPlayer(p);
    }
  });

  // Coins
  levelData.coins.forEach(c=>{
    if(c.collected) return;
    if(p.x+p.w>c.x && p.x<c.x+20 && p.y+ph>c.y && p.y<c.y+20){
      c.collected=true; p.coins++; p.score+=50;
      spawnParticles(c.x+10,c.y+10,'#f1c40f',5); updateUI();
    }
  });

  // Bonus
  levelData.bonusItems.forEach(b=>{
    if(b.collected) return;
    if(p.x+p.w>b.x && p.x<b.x+24 && p.y+ph>b.y && p.y<b.y+24){
      b.collected=true;
      if(b.kind==='mushroom'){ p.big=true; p.score+=500; spawnParticles(b.x+12,b.y+12,'#e74c3c',10); }
      else if(b.kind==='star'){ p.starPower=true; p.powerTimer=300; p.score+=1000; spawnParticles(b.x+12,b.y+12,'#f1c40f',14); }
      else if(b.kind==='heart'){ p.lives=Math.min(p.lives+1,5); p.score+=800; spawnParticles(b.x+12,b.y+12,'#e74c3c',12); }
      updateUI();
    }
  });

  // Win
  if(p.x > LEVEL_LENGTH-80){ p.score+=2000+p.coins*10; updateUI(); winLevel(); }
}

function hitPlayer(p){
  if(p.invincibleTimer>0||p.dead) return;
  if(p.big){ p.big=false; p.invincibleTimer=90; return; }
  killPlayer(p);
}

function killPlayer(p){
  if(p.dead) return;
  p.dead=true; p.deadTimer=70; p.vy=-11;
  spawnParticles(p.x+15,p.y+20, p.idx===1?'#5dade2':'#e74c3c', 16);
}

function checkGameOver(){
  if(players.every(p=>!p.alive)){
    gameState='gameover';
    const tot=players.reduce((s,p)=>s+p.score,0);
    showOverlay('GAME OVER',`ניקוד: ${fmt(tot)}`,'לחץ ENTER לניסיון חוזר');
  }
}

// ─── UPDATE ──────────────────────────────────────────────
function update(){
  if(gameState==='sky'){ updateSkyWorld(); return; }
  if(gameState!=='playing') return;
  frameCount++;

  levelData.platforms.forEach(p=>{
    if(p.type==='moving'){
      if(p.axis==='v'){
        p.y += p.speed*p.dir;
        if(!p.startY) p.startY=p.y;
        if(p.y>p.startY+p.range || p.y<p.startY-p.range) p.dir*=-1;
      } else {
        p.x += p.speed*p.dir;
        if(p.x>p.startX+p.range || p.x<p.startX-p.range) p.dir*=-1;
      }
    }
  });
  levelData.enemies.forEach(e=>{
    if(!e.alive) return;
    if(e.kind==='fly'){
      e.x += e.speed*e.dir;
      if(e.x>e.startX+e.range || e.x<e.startX-e.range) e.dir*=-1;
    } else if(e.kind==='jump'){
      e.x += e.speed*e.dir;
      if(e.pl && (e.x<e.pl.x || e.x+28>e.pl.x+e.pl.w)) e.dir*=-1;
      e.vy += GRAVITY;
      e.y += e.vy;
      if(e.y >= GROUND_Y-36){ e.y=GROUND_Y-36; e.vy=0; }
      e.jumpTimer--;
      if(e.jumpTimer<=0){ e.vy=-11; e.jumpTimer=Math.floor(Math.random()*80)+50; }
    } else if(e.kind==='dino'){
      e.x += e.speed*e.dir;
      if(e.x>e.startX+e.range || e.x<e.startX-e.range) e.dir*=-1;
      // sine-wave vertical float
      e.y = e.baseY !== undefined ? e.baseY + Math.sin(frameCount*0.04 + e.startX*0.01)*22
                                  : (e.baseY=e.y, e.y);
      // decrement ride timer — spawn bat swarm when stomped
      if(e.rideTimer>0) e.rideTimer--;
    } else if(e.kind==='turtle'){
      if(e.stunned>0){ e.stunned--; }
      else {
        e.x += e.speed*e.dir;
        if(e.pl && (e.x<e.pl.x || e.x+28>e.pl.x+e.pl.w)) e.dir*=-1;
      }
    } else if(e.kind==='vine'){
      e.phase = (e.phase||0) + 0.04;
      // bob up/down so player can pass above or below
      if(e.baseYTop===undefined) e.baseYTop = e.yTop;
      e.yTop = e.baseYTop + Math.sin(e.phase * 0.5) * 70;
      e.yBot = e.yTop + 130; // fixed short length
    } else {
      e.x += e.speed*e.dir;
      if(e.pl && (e.x<e.pl.x || e.x+28>e.pl.x+e.pl.w)) e.dir*=-1;
    }
  });

  // Update projectiles (turtle shells)
  levelData.projectiles = (levelData.projectiles||[]).filter(pr=>pr.life>0);
  levelData.projectiles.forEach(pr=>{
    pr.x += pr.vx; pr.y += pr.vy; pr.vy += 0.35; pr.life--;
    // kill nearby ground enemies if it's a ground-level shot
    if(pr.kind==='shell'){
      levelData.enemies.forEach(e2=>{
        if(!e2.alive || e2===pr.source) return;
        if(e2.kind==='vine' || e2.kind==='dino') return;
        if(Math.abs(e2.x-pr.x)<40 && Math.abs(e2.y-pr.y)<50){
          e2.alive=false;
          spawnParticles(e2.x+14, e2.y+15,'#2ecc71',8);
        }
      });
    }
  });

  const p1=players[0];
  const p1run = playerCount===1 ? isKey('ShiftLeft','ShiftRight') : isKey('ShiftLeft');
  const p1jump = isKey('KeyW') || (playerCount===1 && isKey('Space'));
  updatePlayer(p1,
    isKey('KeyA'),
    isKey('KeyD'),
    p1jump,
    p1run);

  if(playerCount===2 && players[1]){
    const p2=players[1];
    const p2run = isKey('ShiftRight');
    updatePlayer(p2,
      isKey('KeyJ'),
      isKey('KeyL'),
      isKey('KeyI'),
      p2run);
  }

  // Camera: follow leading alive player
  const alive=players.filter(p=>p.alive&&!p.dead);
  if(alive.length>0){
    const lead=alive.reduce((a,b)=>a.x>b.x?a:b);
    cameraX=Math.max(0,Math.min(lead.x-W/3, LEVEL_LENGTH-W));
  }

  // Level timer
  levelTimerFrames++;
  if(levelTimerFrames>=60){
    levelTimerFrames=0;
    levelTimer--;
    updateTimerUI();
    if(levelTimer<=0){
      // Kill all alive players
      players.forEach(p=>{ if(p.alive&&!p.dead) killPlayer(p); });
    }
  }

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; });
}

// ─── DRAW ─────────────────────────────────────────────────
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d1b2a'); g.addColorStop(0.6,'#1a3a2a'); g.addColorStop(1,'#0a2010');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  for(let i=0;i<60;i++){
    const sx=((i*137+50)%LEVEL_LENGTH)-cameraX*0.3;
    if(sx<-5||sx>W+5) continue;
    ctx.globalAlpha=0.4+0.6*Math.abs(Math.sin(frameCount*0.03+i));
    ctx.fillStyle='#fff'; ctx.fillRect(sx,(i*73)%200+10,2,2);
  }
  ctx.globalAlpha=1;

  for(let i=0;i<30;i++){
    const tx=((i*200+80)%LEVEL_LENGTH)-cameraX*0.5;
    if(tx<-60||tx>W+60) continue;
    const ty=260+(i%3)*30, th=120+(i%4)*25;
    ctx.fillStyle='#3d2b1f'; ctx.fillRect(tx+10,ty+th-40,12,40);
    ctx.fillStyle=`hsl(${130+i%20},50%,${18+i%8}%)`;
    ctx.beginPath(); ctx.moveTo(tx,ty+th-20); ctx.lineTo(tx+16,ty); ctx.lineTo(tx+32,ty+th-20); ctx.closePath(); ctx.fill();
    ctx.fillStyle=`hsl(${140+i%15},55%,${22+i%8}%)`;
    ctx.beginPath(); ctx.moveTo(tx-4,ty+th); ctx.lineTo(tx+16,ty+25); ctx.lineTo(tx+36,ty+th); ctx.closePath(); ctx.fill();
  }
}

function drawPlatform(p){
  const sx=p.x-cameraX;
  if(sx>W+20||sx+p.w<-20) return;
  if(p.type==='ground'){
    ctx.fillStyle='#2d5a1b'; ctx.fillRect(sx,p.y,p.w,14);
    ctx.fillStyle='#1f3d12'; ctx.fillRect(sx,p.y+14,p.w,p.h-14);
    ctx.fillStyle='#3d7a25';
    for(let gx=sx+4;gx<sx+p.w-4;gx+=12){
      ctx.fillRect(gx,p.y-4,4,7); ctx.fillRect(gx+2,p.y-7,2,5);
    }
  } else if(p.type==='platform'){
    ctx.fillStyle='#4a7c30'; ctx.fillRect(sx,p.y,p.w,p.h);
    ctx.fillStyle='#5e9e3d'; ctx.fillRect(sx,p.y,p.w,6);
    ctx.fillStyle='#3d6628'; ctx.fillRect(sx,p.y+p.h-4,p.w,4);
  } else if(p.type==='moving'){
    const col = p.axis==='v' ? '#2471a3' : '#7b4f9e';
    const colL = p.axis==='v' ? '#5dade2' : '#9b6ebe';
    const glow = p.axis==='v' ? '#aed6f1' : '#c49eff';
    ctx.fillStyle=col; ctx.fillRect(sx,p.y,p.w,p.h);
    ctx.fillStyle=colL; ctx.fillRect(sx,p.y,p.w,5);
    ctx.shadowColor=glow; ctx.shadowBlur=8;
    ctx.strokeStyle=glow; ctx.lineWidth=1;
    ctx.strokeRect(sx+0.5,p.y+0.5,p.w-1,p.h-1);
    ctx.shadowBlur=0;
    // arrow indicator
    ctx.fillStyle=glow; ctx.globalAlpha=0.7;
    if(p.axis==='v'){
      const ay=p.y+p.h/2, ax=sx+p.w/2;
      const d=p.dir>0?1:-1;
      ctx.beginPath(); ctx.moveTo(ax,ay+d*6); ctx.lineTo(ax-5,ay-d*2); ctx.lineTo(ax+5,ay-d*2); ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function drawSpikes(s){
  const sx=s.x-cameraX;
  if(sx>W||sx+s.w<0) return;
  ctx.fillStyle='#bbb';
  for(let i=0;i<Math.floor(s.w/10);i++){
    ctx.beginPath();
    ctx.moveTo(sx+i*10,s.y+14); ctx.lineTo(sx+i*10+5,s.y); ctx.lineTo(sx+i*10+10,s.y+14);
    ctx.closePath(); ctx.fill();
  }
}

function drawEnemy(e){
  if(!e.alive) return;
  const sx=e.x-cameraX;
  if(sx>W+40||sx+40<0) return;

  if(e.kind==='fly'){
    // Bat-like flyer — purple, wings flap
    const flap=Math.sin(frameCount*0.25)*8;
    ctx.fillStyle='#8e44ad';
    // body
    ctx.beginPath(); ctx.ellipse(sx+14,e.y+12,10,8,0,0,Math.PI*2); ctx.fill();
    // wings
    ctx.fillStyle='#6c3483';
    ctx.beginPath(); ctx.moveTo(sx+4,e.y+10); ctx.quadraticCurveTo(sx-10,e.y+flap,sx-4,e.y+20); ctx.lineTo(sx+4,e.y+14); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(sx+24,e.y+10); ctx.quadraticCurveTo(sx+38,e.y+flap,sx+32,e.y+20); ctx.lineTo(sx+24,e.y+14); ctx.closePath(); ctx.fill();
    // eyes
    ctx.fillStyle='#f39c12';
    ctx.beginPath(); ctx.arc(sx+10,e.y+10,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+18,e.y+10,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx+11,e.y+10,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+19,e.y+10,1.5,0,Math.PI*2); ctx.fill();
    // fangs
    ctx.fillStyle='#fff';
    ctx.fillRect(sx+10,e.y+17,3,4); ctx.fillRect(sx+15,e.y+17,3,4);
    return;
  }

  if(e.kind==='jump'){
    // Spring-loaded frog — green, squishes before jump
    const squat = e.vy < -2 ? 0.6 : 1;
    const stretch = e.vy < -2 ? 1.4 : 1;
    ctx.save(); ctx.translate(sx+14, e.y+18);
    ctx.scale(1/squat, squat); ctx.translate(-14,-18);
    // body
    ctx.fillStyle='#27ae60';
    ctx.beginPath(); ctx.ellipse(14,20,13,11,0,0,Math.PI*2); ctx.fill();
    // eyes
    ctx.fillStyle='#2ecc71';
    ctx.beginPath(); ctx.ellipse(7,12,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(21,12,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(7+(e.dir>0?1:-1),12,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(21+(e.dir>0?1:-1),12,2.5,0,Math.PI*2); ctx.fill();
    // legs
    ctx.fillStyle='#1e8449';
    ctx.fillRect(0,28,8,6); ctx.fillRect(6,30,8,4);
    ctx.fillRect(16,28,8,6); ctx.fillRect(14,30,8,4);
    // mouth
    ctx.strokeStyle='#1a5c30'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(14,22,6,0.1,Math.PI-0.1); ctx.stroke();
    ctx.restore();
    return;
  }

  // Walker (original bug enemy)
  const b=Math.sin(frameCount*0.2)*2;
  ctx.fillStyle='#c0392b';
  ctx.beginPath(); ctx.ellipse(sx+14,e.y+22+b,14,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(sx+(e.dir>0?14:6),e.y+16+b,7,7);
  ctx.fillStyle='#000'; ctx.fillRect(sx+(e.dir>0?16:8),e.y+18+b,4,4);
  ctx.fillStyle='#922b21'; ctx.fillRect(sx+3,e.y+30+b,8,6); ctx.fillRect(sx+17,e.y+30+b,8,6);
  ctx.strokeStyle='#922b21'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx+10,e.y+10+b); ctx.lineTo(sx+6,e.y+2+b);
  ctx.moveTo(sx+18,e.y+10+b); ctx.lineTo(sx+22,e.y+2+b); ctx.stroke();
}

function drawDino(e){
  if(!e.alive) return;
  const sx=e.x-cameraX;
  if(sx>W+60||sx+60<0) return;
  const fly=Math.sin(frameCount*0.12)*4;
  // body — big teal dinosaur
  ctx.fillStyle='#16a085';
  ctx.beginPath(); ctx.ellipse(sx+22,e.y+18+fly,20,14,0,0,Math.PI*2); ctx.fill();
  // neck + head
  ctx.fillStyle='#1abc9c';
  ctx.fillRect(sx+(e.dir>0?28:6),e.y+fly,14,16);
  ctx.beginPath(); ctx.ellipse(sx+(e.dir>0?38:8),e.y+6+fly,10,8,0,0,Math.PI*2); ctx.fill();
  // eye
  ctx.fillStyle='#f1c40f';
  ctx.beginPath(); ctx.arc(sx+(e.dir>0?40:6),e.y+4+fly,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(sx+(e.dir>0?41:5),e.y+4+fly,1.5,0,Math.PI*2); ctx.fill();
  // wings
  const wflap=Math.sin(frameCount*0.18)*12;
  ctx.fillStyle='#148f77';
  ctx.beginPath(); ctx.moveTo(sx+10,e.y+10+fly); ctx.quadraticCurveTo(sx-14,e.y+wflap+fly,sx+2,e.y+26+fly); ctx.lineTo(sx+10,e.y+20+fly); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(sx+34,e.y+10+fly); ctx.quadraticCurveTo(sx+58,e.y+wflap+fly,sx+42,e.y+26+fly); ctx.lineTo(sx+34,e.y+20+fly); ctx.closePath(); ctx.fill();
  // spines on back
  ctx.fillStyle='#e74c3c';
  for(let i=0;i<3;i++) {
    ctx.beginPath(); ctx.moveTo(sx+14+i*6,e.y+4+fly); ctx.lineTo(sx+11+i*6,e.y-6+fly); ctx.lineTo(sx+18+i*6,e.y+4+fly); ctx.closePath(); ctx.fill();
  }
  // tail
  ctx.strokeStyle='#16a085'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(sx+(e.dir>0?2:42),e.y+20+fly);
  ctx.quadraticCurveTo(sx+(e.dir>0?-14:56),e.y+28+fly,sx+(e.dir>0?-6:48),e.y+36+fly); ctx.stroke();
  // ride hint (glow when rideable)
  if(e.rideTimer===0){
    ctx.shadowColor='#f1c40f'; ctx.shadowBlur=10;
    ctx.strokeStyle='#f1c40f'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(sx+22,e.y+8+fly,22,18,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  }
}

function drawTurtle(e){
  if(!e.alive) return;
  const sx=e.x-cameraX;
  if(sx>W+40||sx+40<0) return;
  const bob = e.stunned>0 ? Math.sin(frameCount*0.4)*3 : 0;
  // shell
  ctx.fillStyle= e.stunned>0 ? '#f39c12' : '#27ae60';
  ctx.beginPath(); ctx.ellipse(sx+14,e.y+16+bob,14,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle= e.stunned>0 ? '#e67e22' : '#1e8449';
  // shell pattern
  ctx.beginPath(); ctx.moveTo(sx+14,e.y+4+bob); ctx.lineTo(sx+6,e.y+16+bob); ctx.lineTo(sx+22,e.y+16+bob); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(sx+4,e.y+12+bob); ctx.lineTo(sx+24,e.y+12+bob); ctx.stroke();
  // head (retracted if stunned)
  if(e.stunned<=0){
    ctx.fillStyle='#2ecc71';
    ctx.beginPath(); ctx.ellipse(sx+(e.dir>0?24:4),e.y+10+bob,6,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx+(e.dir>0?27:3),e.y+9+bob,2,0,Math.PI*2); ctx.fill();
  }
  // legs
  ctx.fillStyle='#2ecc71';
  ctx.fillRect(sx+2, e.y+24+bob,6,6); ctx.fillRect(sx+20,e.y+24+bob,6,6);
}

function drawVine(e){
  if(!e.alive) return;
  const sx = e.x - cameraX;
  if(sx>W+50||sx<-50) return;
  const swing = Math.sin(e.phase)*14;

  // draw vine rope (short, wavy)
  ctx.strokeStyle='#27ae60'; ctx.lineWidth=6; ctx.lineJoin='round';
  ctx.beginPath();
  const steps = 8;
  for(let i=0;i<=steps;i++){
    const y = e.yTop + (e.yBot - e.yTop) * i / steps;
    const sw = Math.sin(e.phase + i * 0.8) * swing;
    if(i===0) ctx.moveTo(sx + sw, y); else ctx.lineTo(sx + sw, y);
  }
  ctx.stroke();

  // 3 leaves
  ctx.fillStyle='#2ecc71';
  for(let i=0;i<3;i++){
    const ly = e.yTop + (e.yBot - e.yTop) * (i+0.5) / 3;
    const sw = Math.sin(e.phase + i * 1.1) * swing;
    ctx.save();
    ctx.translate(sx + sw + (i%2===0?8:-8), ly);
    ctx.rotate(Math.sin(e.phase + i) * 0.5 + (i%2===0?0.3:-0.3));
    ctx.beginPath(); ctx.ellipse(0, 0, 14, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // spiky hazard tip (bottom of vine — hangs down)
  const tipX = sx + Math.sin(e.phase + steps * 0.8) * swing;
  const tipY = e.yBot;
  ctx.shadowColor='#e74c3c'; ctx.shadowBlur=10;
  ctx.fillStyle='#e74c3c';
  // draw small spiky ball
  for(let i=0;i<6;i++){
    const a = (i/6)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX + Math.cos(a)*10, tipY + Math.sin(a)*10);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(tipX, tipY, 7, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // anchor point at top (fixed to ceiling/wall)
  ctx.fillStyle='#5d4037';
  ctx.beginPath(); ctx.arc(sx, e.yTop, 5, 0, Math.PI*2); ctx.fill();
}

function drawProjectiles(){
  (levelData.projectiles||[]).forEach(pr=>{
    const sx=pr.x-cameraX;
    if(sx<-20||sx>W+20) return;
    const spin=frameCount*0.25;
    ctx.save(); ctx.translate(sx,pr.y); ctx.rotate(spin);
    ctx.fillStyle='#2ecc71';
    ctx.beginPath(); ctx.ellipse(0,0,8,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1e8449';
    ctx.beginPath(); ctx.ellipse(0,0,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // danger glow if falling back down
    if(pr.vy>0){
      ctx.shadowColor='#e74c3c'; ctx.shadowBlur=6;
      ctx.fillStyle='rgba(231,76,60,0.3)';
      ctx.beginPath(); ctx.arc(sx,pr.y,10,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  });
}

function drawCoin(c){
  if(c.collected) return;
  const sx=c.x-cameraX;
  if(sx>W||sx<-20) return;
  const spin=Math.abs(Math.cos(frameCount*0.1+c.x*0.1));
  const bob=Math.sin(frameCount*0.08+c.x*0.05)*3;
  ctx.fillStyle='#f1c40f'; ctx.shadowColor='#f1c40f'; ctx.shadowBlur=6;
  ctx.fillRect(sx+2,c.y+bob,16*spin+2,18);
  ctx.fillStyle='#f39c12'; ctx.fillRect(sx+5,c.y+3+bob,10*spin,6);
  ctx.shadowBlur=0;
}

function drawBonus(b){
  if(b.collected) return;
  const sx=b.x-cameraX;
  if(sx>W||sx<-30) return;
  const bob=Math.sin(frameCount*0.06+b.x*0.05)*4;
  if(b.kind==='mushroom'){
    ctx.fillStyle='#e74c3c';
    ctx.beginPath(); ctx.ellipse(sx+12,b.y+10+bob,12,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(sx+8,b.y+8+bob,3,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx+16,b.y+7+bob,3,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5cba7'; ctx.fillRect(sx+7,b.y+16+bob,10,8);
  } else if(b.kind==='star'){
    ctx.shadowColor='#f1c40f'; ctx.shadowBlur=14; ctx.fillStyle='#f1c40f';
    const cx=sx+12,cy=b.y+12+bob;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*4*Math.PI/5)-Math.PI/2, a2=((i*2+1)*2*Math.PI/10)-Math.PI/2;
      i===0?ctx.moveTo(cx+Math.cos(a)*12,cy+Math.sin(a)*12):ctx.lineTo(cx+Math.cos(a)*12,cy+Math.sin(a)*12);
      ctx.lineTo(cx+Math.cos(a2)*5,cy+Math.sin(a2)*5);
    }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
  } else if(b.kind==='heart'){
    ctx.fillStyle='#e74c3c'; ctx.shadowColor='#e74c3c'; ctx.shadowBlur=10;
    const hx=sx+12,hy=b.y+12+bob;
    ctx.beginPath(); ctx.moveTo(hx,hy+4);
    ctx.bezierCurveTo(hx,hy-4,hx-10,hy-4,hx-10,hy+2);
    ctx.bezierCurveTo(hx-10,hy+8,hx,hy+14,hx,hy+14);
    ctx.bezierCurveTo(hx,hy+14,hx+10,hy+8,hx+10,hy+2);
    ctx.bezierCurveTo(hx+10,hy-4,hx,hy-4,hx,hy+4);
    ctx.fill(); ctx.shadowBlur=0;
  }
}

function drawCharacter(p){
  if(!p.alive) return;
  const sx=p.x-cameraX;
  if(sx>W+40||sx+p.w<-40) return;
  const ph=p.h, pw=p.w;
  const isP2=p.idx===2;

  if(p.dead){
    // Death tumble
    ctx.save();
    ctx.translate(sx+pw/2, p.y+ph/2);
    ctx.rotate(frameCount*0.15);
    ctx.globalAlpha=Math.max(0, p.deadTimer/70);
    ctx.fillStyle=isP2?'#e74c3c':'#5dade2';
    ctx.fillRect(-pw/2,-ph/2,pw,ph);
    ctx.globalAlpha=1;
    ctx.restore();
    return;
  }

  const starFlash=p.starPower&&frameCount%4<2;
  const alpha=p.invincibleTimer>0&&frameCount%4<2?0.35:1;
  ctx.globalAlpha=alpha;
  ctx.save();
  if(p.facing<0){ ctx.translate(sx+pw/2, p.y); ctx.scale(-1,1); ctx.translate(-pw/2,0); }
  else ctx.translate(sx, p.y);

  const hatC=starFlash?'#f1c40f':(isP2?'#c0392b':'#2ecc71');
  const hatD=starFlash?'#e67e22':(isP2?'#922b21':'#27ae60');
  ctx.fillStyle=hatC; ctx.fillRect(4,2,pw-8,14); ctx.fillRect(0,12,pw,6);
  ctx.fillStyle=hatD; ctx.fillRect(6,4,pw-12,8);

  const bodyC=starFlash?'#f39c12':(isP2?'#e67e22':'#3498db');
  const ovC=starFlash?'#e74c3c':(isP2?'#d35400':'#2980b9');
  ctx.fillStyle=bodyC; ctx.fillRect(2,18,pw-4,p.big?22:16);
  ctx.fillStyle=ovC; ctx.fillRect(4,26,pw-8,p.big?12:8);

  ctx.fillStyle='#fad7a0'; ctx.fillRect(6,16,pw-12,10);
  ctx.fillStyle='#000'; ctx.fillRect(12,18,4,4);
  ctx.fillStyle='#5d4037'; ctx.fillRect(7,24,8,2); ctx.fillRect(17,24,6,2);

  const walk=Math.floor(frameCount/6)%2;
  const lo=Math.abs(p.vx)>0.5&&p.onGround?(walk?3:-3):0;
  ctx.fillStyle=ovC;
  ctx.fillRect(2,ph-14,12,14+(lo>0?lo:0));
  ctx.fillRect(pw-14,ph-14,12,14+(lo<0?-lo:0));
  ctx.fillStyle='#111';
  ctx.fillRect(0,ph-5,14,5); ctx.fillRect(pw-14,ph-5,14,5);

  if(isP2){
    ctx.fillStyle='#e74c3c'; ctx.fillRect(pw-10,0,10,8);
    ctx.fillStyle='#fff'; ctx.font='bold 6px monospace'; ctx.fillText('2',pw-8,7);
  }

  ctx.restore();
  ctx.globalAlpha=1;
}

function drawGoal(){
  const gx=LEVEL_LENGTH-80-cameraX;
  if(gx>W+50||gx<-80) return;
  ctx.fillStyle='#7f8c8d'; ctx.fillRect(gx+20,150,8,300);
  const wave=Math.sin(frameCount*0.08)*5;
  ctx.fillStyle='#2ecc71';
  ctx.beginPath(); ctx.moveTo(gx+28,150); ctx.lineTo(gx+28+wave+45,175); ctx.lineTo(gx+28,200); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#7f8c8d'; ctx.fillRect(gx,330,60,120);
  ctx.fillStyle='#95a5a6';
  for(let i=0;i<3;i++) ctx.fillRect(gx+i*20,320,14,16);
  ctx.fillStyle='#2c3e50'; ctx.fillRect(gx+18,380,24,50);
  ctx.fillStyle='#f1c40f'; ctx.fillRect(gx+20,355,8,8); ctx.fillRect(gx+32,355,8,8);
}

function drawPits(){
  levelData.pits.forEach(pit=>{
    const sx=pit.x-cameraX;
    if(sx>W||sx+pit.w<0) return;
    const g=ctx.createLinearGradient(sx,440,sx,H);
    g.addColorStop(0,'rgba(0,0,0,0.9)'); g.addColorStop(1,'#000');
    ctx.fillStyle=g; ctx.fillRect(sx,440,pit.w,H-440);
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    const s=p.size*(p.life/p.maxLife)+1;
    ctx.fillRect(p.x-s/2,p.y-s/2,s,s);
  });
  ctx.globalAlpha=1;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(gameState==='sky'){ drawSkyWorld(); return; }
  drawBg();
  drawPits();
  levelData.platforms.forEach(drawPlatform);
  levelData.spikes.forEach(drawSpikes);
  drawGoal();
  levelData.coins.forEach(drawCoin);
  levelData.bonusItems.forEach(drawBonus);
  // Draw vines behind everything
  levelData.enemies.filter(e=>e.kind==='vine').forEach(drawVine);
  levelData.enemies.filter(e=>e.kind==='dino').forEach(drawDino);
  levelData.enemies.filter(e=>e.kind==='turtle').forEach(drawTurtle);
  levelData.enemies.filter(e=>e.kind!=='vine'&&e.kind!=='dino'&&e.kind!=='turtle').forEach(drawEnemy);
  drawProjectiles();
  players.forEach(drawCharacter);
  drawParticles();

  if(players.some(p=>p.dead)){
    ctx.fillStyle=`rgba(200,0,0,${0.18*Math.abs(Math.sin(frameCount*0.15))})`;
    ctx.fillRect(0,0,W,H);
  }
  if(gameState==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,H);
  }
}

// ─── UI ──────────────────────────────────────────────────
function fmt(n){ return String(Math.floor(n)).padStart(6,'0'); }

function updateTimerUI(){
  const el=document.getElementById('timer-display');
  if(!el) return;
  el.textContent=Math.max(0,levelTimer);
  el.style.color = levelTimer<=10 ? '#e74c3c' : levelTimer<=30 ? '#e67e22' : '#f1c40f';
  // flash red when low
  el.style.animation = levelTimer<=10 ? 'pulse 0.5s infinite' : 'none';
}

function updateUI(){
  const p1=players[0];
  document.getElementById('score1').textContent=fmt(p1.score);
  document.getElementById('coins1').textContent=`🪙 ${p1.coins}`;
  document.getElementById('lives1').textContent='💙'.repeat(Math.max(0,p1.lives))+'🖤'.repeat(Math.max(0,3-p1.lives));
  document.getElementById('level-display').textContent=level;
  updateTimerUI();
  const p2ui=document.getElementById('p2-ui');
  if(playerCount===2&&players[1]){
    p2ui.style.opacity='1';
    const p2=players[1];
    document.getElementById('score2').textContent=fmt(p2.score);
    document.getElementById('coins2').textContent=`🪙 ${p2.coins}`;
    document.getElementById('lives2').textContent='❤️'.repeat(Math.max(0,p2.lives))+'🖤'.repeat(Math.max(0,3-p2.lives));
  } else {
    p2ui.style.opacity='0.2';
  }
}

function showOverlay(title,score,sub){
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-score').textContent=score||'';
  document.getElementById('overlay-sub').innerHTML=sub||'';
  document.getElementById('mode-select').style.display='none';
}

function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }

// ─── GAME FLOW ────────────────────────────────────────────
function startGame(n){
  playerCount=n; level=1;
  players=[makePlayer(1)];
  if(n===2) players.push(makePlayer(2));
  levelData=makeLevel(level); LEVEL_LENGTH=levelData.LEVEL_LENGTH;
  cameraX=0; particles=[]; frameCount=0;
  levelTimer=levelData.TIMER; levelTimerFrames=0;
  hideOverlay(); gameState='playing'; updateUI();
}

function nextLevel(){
  level++;
  levelData=makeLevel(level); LEVEL_LENGTH=levelData.LEVEL_LENGTH;
  players.forEach(p=>{ if(p.alive) resetPlayer(p); });
  particles=[]; hideOverlay(); gameState='playing';
  levelTimer=levelData.TIMER; levelTimerFrames=0;
  updateUI();
}

function restartGame(){ startGame(playerCount); }

function winLevel(){
  if(gameState==='win') return;
  gameState='win';
  const bonus = levelTimer * 100;
  players.forEach(p=>{ if(p.alive) p.score+=bonus; });
  updateUI();
  const p2=players[1];
  let msg=`P1: ${fmt(players[0].score)}`;
  if(p2) msg+=`  |  P2: ${fmt(p2.score)}`;
  const bonusStr = bonus>0 ? `⏱ בונוס זמן: +${bonus}` : '';
  showOverlay(`🌟 שלב ${level} הושלם!`,msg,`${bonusStr}<br>לחץ ENTER לשלב הבא`);
}


// ─── SKY WORLD FUNCTIONS ─────────────────────────────────────────
function enterSkyWorld(player, dinoEnemy){
  gameState = 'sky';
  const clouds = [];
  for(let i=0;i<22;i++){
    clouds.push({
      x: 80+i*280+Math.random()*150, y: 50+Math.random()*260,
      w: 80+Math.random()*130, h: 35+Math.random()*50,
      speed: 0.4+Math.random()*0.5, layers: 2+Math.floor(Math.random()*3)
    });
  }
  skyWorld = {
    rider:player, dinoEnemy,
    returnX:player.x, returnY:player.y, returnCameraX:cameraX,
    dx:160, dy:H/2, dvx:0, dvy:0,
    bats:[], flames:[], clouds,
    scrollX:0, fc:0, health:5, batsKilled:0,
    spawnTimer:80, phase:0, flashTimer:0, totalBatsNeeded:20,
    _lastFire:0
  };
}

function updateSkyWorld(){
  if(!skyWorld) return;
  const sw = skyWorld;
  sw.fc++;
  sw.clouds.forEach(c=>{ c.x-=c.speed; if(c.x+c.w<-50) c.x=W+50+Math.random()*200; });
  if(sw.phase===0 && sw.fc>90) sw.phase=1;

  const spd=3.5;
  sw.dvx=0; sw.dvy=0;
  if(isKey('KeyA')) sw.dvx=-spd;
  if(isKey('KeyD')) sw.dvx= spd;
  if(isKey('KeyW')) sw.dvy=-spd;
  if(isKey('KeyX')||isKey('KeyS')) sw.dvy= spd;
  sw.dx=Math.max(60,Math.min(W-80,sw.dx+sw.dvx));
  sw.dy=Math.max(40,Math.min(H-60,sw.dy+sw.dvy));

  if(isKey('Space')&&sw.phase===1&&sw.fc-sw._lastFire>8){
    sw._lastFire=sw.fc;
    sw.flames.push({x:sw.dx+50,y:sw.dy,vx:9+Math.random()*3,vy:(Math.random()-0.5)*1.5,life:35});
  }
  sw.flames=sw.flames.filter(f=>f.life>0);
  sw.flames.forEach(f=>{f.x+=f.vx;f.y+=f.vy;f.life--;});

  if(sw.phase===1){
    sw.spawnTimer--;
    if(sw.spawnTimer<=0&&sw.batsKilled<sw.totalBatsNeeded){
      const count=sw.batsKilled<10?1:2;
      for(let i=0;i<count;i++){
        const side=Math.random()<0.7;
        sw.bats.push({
          x:side?W+30:-30, y:80+Math.random()*(H-160),
          vx:side?-(2.5+Math.random()*2):(2.5+Math.random()*2),
          vy:(Math.random()-0.5)*2, alive:true, phase:Math.random()*Math.PI*2
        });
      }
      sw.spawnTimer=Math.max(25,80-sw.batsKilled*3);
    }
  }

  sw.bats=sw.bats.filter(b=>b.alive&&b.x>-80&&b.x<W+80);
  sw.bats.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy; b.phase+=0.12;
    b.y+=Math.sin(b.phase)*1.2;
    if(sw.phase===1){
      const ddx=sw.dx-b.x,ddy=sw.dy-b.y,dist=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dist>60){b.vx+=ddx/dist*0.06;b.vy+=ddy/dist*0.06;}
    }
    const spd2=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd2>4.5){b.vx=b.vx/spd2*4.5;b.vy=b.vy/spd2*4.5;}
    sw.flames.forEach(f=>{
      if(f.life>0&&Math.abs(f.x-b.x)<22&&Math.abs(f.y-b.y)<22){
        b.alive=false;f.life=0;sw.batsKilled++;
        spawnParticles(b.x,b.y,'#e74c3c',6);
      }
    });
    if(b.alive&&Math.abs(b.x-sw.dx)<35&&Math.abs(b.y-sw.dy)<30){
      b.alive=false;sw.batsKilled++;sw.health--;sw.flashTimer=20;
      spawnParticles(sw.dx,sw.dy,'#e74c3c',10);
      if(sw.health<=0){exitSkyWorld(false);return;}
    }
  });

  if(sw.phase===1&&sw.batsKilled>=sw.totalBatsNeeded&&sw.bats.length===0){sw.phase=2;sw.fc=0;}
  if(sw.phase===2&&sw.fc>120) exitSkyWorld(true);
}

function exitSkyWorld(won){
  if(!skyWorld) return;
  const sw=skyWorld;
  sw.rider.x=sw.returnX; sw.rider.y=sw.returnY-10;
  sw.rider.vx=0; sw.rider.vy=-8; sw.rider.invincibleTimer=180;
  cameraX=sw.returnCameraX;
  if(won){
    sw.rider.score+=2000;
    sw.rider.lives=Math.min(sw.rider.lives+1,9);   // +1 life
    sw.rider.coins+=10;                             // +10 coins
    sw.rider.score+=10*50;                          // coin score
    spawnParticles(sw.rider.x+15,sw.rider.y,'#f1c40f',30);
    sw.dinoEnemy.alive=false;
  }
  updateUI(); skyWorld=null; gameState='playing';
}

function drawSkyWorld(){
  if(!skyWorld) return;
  const sw=skyWorld;
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#0a0a3e'); sg.addColorStop(0.4,'#1a4a9e'); sg.addColorStop(1,'#5ba3d9');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // stars
  for(let i=0;i<40;i++){
    const stx=((i*197+sw.scrollX*0.1)%W), sty=((i*83)%150);
    ctx.globalAlpha=0.3+0.7*Math.abs(Math.sin(sw.fc*0.05+i));
    ctx.fillStyle='#fff'; ctx.fillRect(stx,sty,2,2);
  }
  ctx.globalAlpha=1;

  // clouds
  sw.clouds.forEach(c=>{
    ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=12;
    for(let l=0;l<c.layers;l++){
      ctx.fillStyle=`rgba(255,255,255,${0.7-l*0.15})`;
      ctx.beginPath(); ctx.ellipse(c.x+l*(c.w*0.28),c.y+l*7,c.w*(0.48-l*0.09),c.h*(0.48-l*0.07),0,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
  });

  // hearts HUD
  for(let i=0;i<5;i++){
    ctx.globalAlpha=i<sw.health?1:0.2;
    ctx.font='22px serif'; ctx.fillText('❤️',14+i*28,32);
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#fff'; ctx.font='bold 12px "Press Start 2P",monospace';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText('🦇 '+sw.batsKilled+'/'+sw.totalBatsNeeded,W-190,30);
  ctx.shadowBlur=0;

  if(sw.phase===0){
    ctx.fillStyle='#fff'; ctx.font='bold 16px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=6;
    ctx.fillText('🦕 עולם השמיים!',W/2,H/2-24);
    ctx.font='8px "Press Start 2P",monospace';
    ctx.fillText('A D W X לתנועה  |  SPACE לאש',W/2,H/2+14);
    ctx.textAlign='left'; ctx.shadowBlur=0;
  }
  if(sw.phase===2){
    ctx.fillStyle='#f1c40f'; ctx.font='bold 18px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=8;
    ctx.fillText('🌟 ניצחת! +2000',W/2,H/2);
    ctx.textAlign='left'; ctx.shadowBlur=0;
  }

  if(sw.flashTimer>0){ctx.fillStyle=`rgba(255,0,0,${sw.flashTimer/40})`;ctx.fillRect(0,0,W,H);sw.flashTimer--;}

  // bats
  sw.bats.forEach(b=>{
    if(!b.alive) return;
    const flap=Math.sin(sw.fc*0.3+b.phase)*10;
    ctx.fillStyle='#6c3483';
    ctx.beginPath(); ctx.ellipse(b.x,b.y,10,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8e44ad';
    ctx.beginPath(); ctx.moveTo(b.x-4,b.y-2); ctx.quadraticCurveTo(b.x-20,b.y+flap,b.x-10,b.y+10); ctx.lineTo(b.x-4,b.y+4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(b.x+4,b.y-2); ctx.quadraticCurveTo(b.x+20,b.y+flap,b.x+10,b.y+10); ctx.lineTo(b.x+4,b.y+4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#f39c12';
    ctx.beginPath(); ctx.arc(b.x-4,b.y-2,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(b.x+4,b.y-2,2.5,0,Math.PI*2); ctx.fill();
  });

  // flames
  sw.flames.forEach(f=>{
    ctx.globalAlpha=f.life/35;
    const fg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,18);
    fg.addColorStop(0,'#fff7aa'); fg.addColorStop(0.35,'#f39c12'); fg.addColorStop(1,'rgba(231,76,60,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(f.x,f.y,18,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });

  // dino
  const ddx=sw.dx, ddy=sw.dy;
  const bob=Math.sin(sw.fc*0.1)*4+(sw.dvx!==0||sw.dvy!==0?Math.sin(sw.fc*0.25)*3:0);
  const wflap2=Math.sin(sw.fc*(sw.dvx!==0||sw.dvy!==0?0.25:0.12))*18;
  ctx.fillStyle='#148f77';
  ctx.beginPath(); ctx.moveTo(ddx-10,ddy+bob); ctx.quadraticCurveTo(ddx-50,ddy+wflap2+bob,ddx-28,ddy+30+bob); ctx.lineTo(ddx-10,ddy+20+bob); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ddx+54,ddy+bob); ctx.quadraticCurveTo(ddx+94,ddy+wflap2+bob,ddx+72,ddy+30+bob); ctx.lineTo(ddx+54,ddy+20+bob); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#16a085';
  ctx.beginPath(); ctx.ellipse(ddx+22,ddy+18+bob,26,18,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1abc9c';
  ctx.fillRect(ddx+34,ddy+bob,16,18);
  ctx.beginPath(); ctx.ellipse(ddx+46,ddy+6+bob,12,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f1c40f';
  ctx.beginPath(); ctx.arc(ddx+50,ddy+3+bob,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(ddx+51,ddy+3+bob,1.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e74c3c';
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(ddx+12+i*8,ddy+4+bob);ctx.lineTo(ddx+9+i*8,ddy-7+bob);ctx.lineTo(ddx+17+i*8,ddy+4+bob);ctx.closePath();ctx.fill();}
  ctx.strokeStyle='#16a085'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(ddx+2,ddy+20+bob); ctx.quadraticCurveTo(ddx-18,ddy+28+bob,ddx-8,ddy+38+bob); ctx.stroke();

  // rider on dino
  const isP2r=sw.rider.idx===2;
  ctx.fillStyle=isP2r?'#c0392b':'#2ecc71'; ctx.fillRect(ddx+16,ddy-8+bob,18,10);
  ctx.fillStyle=isP2r?'#e67e22':'#3498db'; ctx.fillRect(ddx+17,ddy+2+bob,16,14);
  ctx.fillStyle='#fad7a0'; ctx.fillRect(ddx+19,ddy-1+bob,12,8);
  ctx.fillStyle='#111'; ctx.fillRect(ddx+22,ddy+1+bob,3,3); ctx.fillRect(ddx+27,ddy+1+bob,3,3);

  // fire breath visual
  if(isKey('Space')&&sw.phase===1){
    const fx=ddx+58, fy=ddy+6+bob;
    for(let i=0;i<5;i++){
      const r=7+i*7; ctx.globalAlpha=0.7-i*0.12;
      const fg2=ctx.createRadialGradient(fx,fy,0,fx,fy,r);
      fg2.addColorStop(0,'#fff7aa'); fg2.addColorStop(0.4,'#e67e22'); fg2.addColorStop(1,'rgba(231,76,60,0)');
      ctx.fillStyle=fg2; ctx.beginPath(); ctx.arc(fx+i*9,fy,r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}
// ─── LOOP ─────────────────────────────────────────────────
function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop); }
updateUI();
gameLoop();
</script>
</body>
