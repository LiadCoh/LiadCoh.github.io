<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחקים</title>

  <style>
    :root {
      --bg-main: #c6d521ab;
      --bg-card: #888dad;
      --accent: #ffcc00;
      --text-main: #ffffff;
      --text-muted: #c7c9ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #1727b7, var(--bg-main));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      text-align: right;
    }

    /* ---------- HEADER ---------- */
    header {
      padding: 60px 20px 30px;
    }

    header h1 {
      margin: 0;
      font-size: 2.8em;
    }

    header p {
      margin-top: 12px;
      font-size: 1.1em;
      color: var(--text-muted);
    }

    /* ---------- MAIN ---------- */
    main {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .games-grid {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    /* ---------- GAME CARD ---------- */
    .game-card {
      background: linear-gradient(160deg, #232866, var(--bg-card));
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 55px rgba(0,0,0,0.6);
    }

    .game-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .game-card h2 {
      margin: 0;
      font-size: 1.7em;
    }

    .game-card p {
      margin-top: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      flex-grow: 1;
    }

    /* ---------- BUTTON ---------- */
    .play-btn {
      margin-top: 24px;
      text-align: center;
    }

    .play-btn a {
      display: inline-block;
      padding: 14px 34px;
      background: var(--accent);
      color: #1a1a1a;
      font-weight: bold;
      font-size: 1.05em;
      text-decoration: none;
      border-radius: 999px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .play-btn a:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    /* ---------- FOOTER ---------- */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 25px 10px;
      font-size: 0.9em;
      color: #9a9ccc;
    }
  </style>
</head>

<body>

  <header>
    <h1>משחקים</h1>
  </header>

  <main>
    <section class="games-grid">

      <div class="game-card">
        <div class="game-icon">🦘</div>
        <h2>קפצן</h2>
        <p>
          משחק קפיצות מהיר וממכר.
          הימנע ממכשולים, בדוק את הרפלקסים שלך
          ונסה לשבור את השיא האישי!
        </p>

        <div class="play-btn">
          <a href="jumper_game.html">שחק עכשיו</a>
        </div>
      </div>

    </section>
  </main>

  <footer>
    © 2026 Liad Coh • כל הזכויות שמורות
  </footer>

</body>
</html>
