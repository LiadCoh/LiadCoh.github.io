<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>המשחקים של ליעד 🎮</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 40px 20px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      margin-top: 10px;
      color: #cfcfe8;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 900px;
      margin-top: 40px;
    }

    .game-card {
      background: #2f2f4f;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .game-card h2 {
      margin-top: 0;
      font-size: 1.5em;
    }

    .game-card p {
      flex-grow: 1;
      color: #d6d6ff;
    }

    .play-button {
      text-align: center;
      margin-top: 20px;
    }

    .play-button a {
      display: inline-block;
      padding: 12px 24px;
      background: #ffcc00;
      color: #1e1e2f;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
      transition: background 0.2s, transform 0.2s;
    }

    .play-button a:hover {
      background: #ffd633;
      transform: scale(1.05);
    }

    footer {
      margin-top: auto;
      padding: 20px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>

<body>

  <header>
    <h1>🎮 המשחקים שלי</h1>
    <p>משחקי דפדפן שבניתי ב-HTML ו-JavaScript</p>
  </header>

  <section class="games">

    <!-- משחק ראשון -->
    <div class="game-card">
      <h2>🦘 קפצן</h2>
      <p>
        משחק זריז וכיפי! קפוץ מעל המכשולים,
        בדוק את הרפלקסים שלך ונסה להשיג את השיא.
      </p>

      <div class="play-button">
        <a href="jumper_game.html">שחק עכשיו</a>
      </div>
    </div>

    <!-- בעתיד: כאן יתווספו עוד משחקים -->

  </section>

  <footer>
    © 2026 ליעד | נבנה באהבה ❤️
  </footer>

</body>
</html>
